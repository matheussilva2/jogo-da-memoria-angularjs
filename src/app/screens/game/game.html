<div class="min-h-screen w-full py-8 px-6 max-w-137.5 mx-auto mb-5">
    <div class="w-full flex justify-between mb-8">
        <a class="icon bg-gray-500 border border-gray-400" routerLink="/jogar">
            <img src="/assets/icons/arrow-left.svg" width="20" height="20" alt="Voltar" />
        </a>
        <div class="icon w-fit bg-gray-500 border border-gray-400 flex items-center justify-center gap-2 px-4">
            <img src="/assets/icons/clock.svg" width="16" height="16" alt="Tempo restante"/>
            <span [class]="`font-bold ${game_service.remaining_time()}`">
                {{ game_service.remaining_time() | timeFormat }}
            </span>
        </div>
    </div>
    <div class="mb-8">
        <h2>{{gameConfig()?.gamemode?.theme}}</h2>
        <p>Encontro todos os pares dentro do tempo!</p>
    </div>
    @if(is_game_starting()) {
        <div class="absolute top-0 left-0 w-screen h-screen bg-gray-600/50 z-10 flex items-center justify-center">
            <span class="text-[72px] font-extrabold text-gray-100">{{start_game_count()}}</span>
        </div>
    }
    @if(gameConfig()) {
        <app-game-board [gameConfig]="gameConfig()" />
    }
</div>
