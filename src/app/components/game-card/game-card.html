<button (click)="flipCard()" [class]="`cursor-pointer bg-gradient-neutral w-full h-full rounded-2xl flex justify-center items-center p-3 ${card()?.isLocked && 'border-4 border-gray-200 opacity-50'}`">
    <img class="w-full" [src]="(isFlipped() || isLocked() || game_service.canShowAllCards())?card()?.content:backCardIcon" />
</button>
