<button (click)="flipCard()" [class]="`cursor-pointer bg-gradient-neutral w-full h-full rounded-2xl flex justify-center items-center ${card()?.isLocked && 'border-4 border-gray-200 opacity-50'}`">
    <img [src]="(isFlipped() || isLocked())?card()?.content:backCardIcon" width="40" height="40" />
</button>
